<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors Game</title>
  </head>

  <body>
    <h2>
      Rock Paper Scissors Game
    </h2>

    <button onclick="playGame('rock')">
      rock
    </button>

    <button onclick="playGame('paper')">
      paper
    </button>

    <button onclick="playGame('scissors')">
      scissors
    </button>

    <p class="printed-result"></p>
    <p class="versus-moves"></p>
    <p class="js-scores"></p>

    <button onclick="
    localStorage.removeItem('score');
    score = {
      wins: 0,
      losses: 0,
      ties: 0
    }
    updateScores();
    ">
      Reset
    </button>

  <script>
     let score = JSON.parse(localStorage.getItem('score')) || {
        wins: 0,
        losses: 0,
        ties: 0
      }

      updateScores();

    function playGame(playerMove){
      const computerMove = pickcomputerMove();

      let result = '';

      if (playerMove === 'rock'){
        if (computerMove === 'rock'){
          result = "Tie.";
        } else if (computerMove === 'paper'){
          result = "You lose.";
        } else if (computerMove === 'scissors'){
          result = "You win.";
        }
      } else if (playerMove === 'paper'){
        if (computerMove === 'rock'){
          result = "You win.";
        } else if (computerMove === 'paper'){
          result = "Tie.";
        } else if (computerMove === 'scissors'){
          result = "You lose.";
        }
      } else if (playerMove === 'scissors'){
        if (computerMove === 'rock'){
          result = "You lose.";
        } else if (computerMove === 'paper'){
          result = "You win.";
        } else if (computerMove === 'scissors'){
          result = "Tie.";
        }
      }

      if (result === "You win."){
        score.wins += 1;
      } else if (result === "You lose."){
        score.losses += 1;
      } else {
        score.ties += 1;
      } 

      document.querySelector('.versus-moves')
      .innerHTML = `You ${playerMove} - Computer ${computerMove}.`;

      document.querySelector('.printed-result')
      .innerHTML = `${result}`;

      localStorage.setItem('score', JSON.stringify(score));

      updateScores();
    }

    function updateScores(){
      document.querySelector('.js-scores')
      .innerHTML = `Wins: ${score.wins}, Losses ${score.losses}, Ties: ${score.ties}.`;
    }

    function pickcomputerMove(){
      const randomNumber = Math.random();

      let move = '';

      if (randomNumber >= 0 && randomNumber < 1 / 3){
        move = 'rock';
      } else if (randomNumber >= 1 / 3 &&  2 / 3){
        move = 'paper';
      } else if (randomNumber >= 2 / 3 && randomNumber < 1){
        move = 'scissors';
      }

      return move;
    }

  </script>

  </body>
</html>
